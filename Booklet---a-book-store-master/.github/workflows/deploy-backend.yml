name: Deploy Backend

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'
  workflow_dispatch:
    
env:
  IMAGE_NAME: amarjeetkumar123/booklet-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest

            docker stop booklet-backend || true
            docker rm booklet-backend || true

            docker run -d \
              --name booklet-backend \
              --network booklet-network \
              --env-file /root/envs/booklet.backend.prod.env \
              --restart unless-stopped \
              -p 8080:8080 \
              ghcr.io/${{ env.IMAGE_NAME }}:latest

            docker image prune -f